<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spooky Skeleton Game</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding-top: 100px;
        }
        #skeleton {
            font-size: 100px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff00;
        }
        #message {
            font-size: 24px;
            margin-bottom: 30px;
        }
        button {
            background-color: #00ff00;
            color: #0d0d0d;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #ffffff;
            box-shadow: 0 0 15px #00ff00;
        }
        input {
            padding: 10px;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="skeleton">💀</div>
    <div id="message">You have been visited by the Green Skeleton! Play with me or are you scared?</div>
    
    <div>
        <button onclick="startGame()">Start the Game!</button>
    </div>

    <script>
        function startGame() {
            let answer = prompt("The Green Skeleton asks: What number am I thinking of between 1 and 10?");
            
            if (answer) {
                // A harmless random number between 1 and 10
                let secretNumber = Math.floor(Math.random() * 10) + 1;
                
                if (parseInt(answer) === secretNumber) {
                    alert("Woah! You read my bones! You win!");
                } else {
                    alert("Haha! Your guess is wrong. The number was " + secretNumber + ". You are a brave challenger!");
                }
            }
        }
    </script>
</body>
</html>
